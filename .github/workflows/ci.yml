name: CI Workflow for IoT Auth Application

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-chaincode:
    name: Run Chaincode Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: chaincode/iot-auth
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chaincode/iot-auth/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

  test-backend:
    name: Run Backend API Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
